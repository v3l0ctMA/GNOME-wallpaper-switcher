name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install glib tools
        run: sudo apt-get install -y libglib2.0-bin

      - name: Compile schema
        run: glib-compile-schemas schemas/

      - name: Build zip
        run: zip -r wallpaper-switcher.zip metadata.json extension.js prefs.js schemas/ README.md Makefile

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: wallpaper-switcher.zip
